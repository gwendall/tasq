name: Bug report
description: Report reproducible incorrect Tasq behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private ledger data, or security vulnerabilities here. Use SECURITY.md for private reporting.
  - type: input
    id: version
    attributes:
      label: Tasq version
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options: [Core, CLI, MCP, Console, Extension SDK, Protocol adapters, Release tooling]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual result
    validations:
      required: true
