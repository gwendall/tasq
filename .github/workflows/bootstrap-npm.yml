name: Bootstrap npm package identities

on:
  workflow_dispatch:
    inputs:
      source_commit:
        description: Exact main commit to build and publish
        required: true
        type: string
      confirmation:
        description: Type bootstrap-seven-packages
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: tasq-npm-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0
      - name: Verify one-shot identity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "gwendall/tasq"
          test "$GITHUB_REF" = "refs/heads/main"
          test "${{ inputs.confirmation }}" = "bootstrap-seven-packages"
          [[ "${{ inputs.source_commit }}" =~ ^[a-f0-9]{40}$ ]]
          test "$(git rev-parse HEAD)" = "${{ inputs.source_commit }}"
          test "$(git rev-parse origin/main)" = "${{ inputs.source_commit }}"
          test -z "$(git tag --points-at HEAD)"
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Pin the npm bootstrap client
        run: |
          npm install --global npm@11.18.0
          test "$(npm --version)" = "11.18.0"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: pnpm install --frozen-lockfile
      - name: Verify the complete source candidate
        run: pnpm verify:handoff
      - name: Build deterministic prerelease candidates
        run: >-
          bun scripts/release/build-public-packages.ts
          --version 0.1.0-alpha.0
          --source-commit "${{ inputs.source_commit }}"
          --outdir dist/packages
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/packages/*"
      - uses: actions/upload-artifact@v4
        with:
          name: tasq-npm-bootstrap-candidates
          path: "dist/packages/*"
          if-no-files-found: error
      - name: Publish only missing byte-identical bootstrap versions
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: |
          set -euo pipefail
          : "${NODE_AUTH_TOKEN:?NPM_BOOTSTRAP_TOKEN is required}"
          release="dist/packages/tasq-packages-v0.1.0-alpha.0.release.json"
          while IFS=$'\t' read -r package filename; do
            candidate="dist/packages/$filename"
            verification="$(
              bun scripts/release/verify-npm-publication.ts \
                --package "$package" \
                --version 0.1.0-alpha.0 \
                --source-commit "${{ inputs.source_commit }}" \
                --tarball "$candidate" \
                --allow-missing
            )"
            if test "$(jq -r '.status' <<< "$verification")" = "missing"; then
              npm publish "$candidate" \
                --access public \
                --tag alpha-bootstrap \
                --provenance
            fi
            bun scripts/release/verify-npm-publication.ts \
              --package "$package" \
              --version 0.1.0-alpha.0 \
              --source-commit "${{ inputs.source_commit }}" \
              --tarball "$candidate"
          done < <(jq -r '.packages[] | [.name, .filename] | @tsv' "$release")
