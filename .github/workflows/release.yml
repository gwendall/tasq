name: Protected release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  identity:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.identity.outputs.version }}
      commit: ${{ steps.identity.outputs.commit }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - id: identity
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "gwendall/tasq"
          test "$(git tag --points-at HEAD)" = "${GITHUB_REF_NAME}"
          version="${GITHUB_REF_NAME#v}"
          [[ "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          commit="$(git rev-parse HEAD)"
          bun scripts/release/verify-release-authorization.ts \
            --version "$version" \
            --source-commit "$commit" \
            --repository "$GITHUB_REPOSITORY"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

  cli:
    needs: identity
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64-gnu
          - os: macos-14
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    environment: release
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: pnpm install --frozen-lockfile
      - name: Build deterministic CLI envelope
        run: >-
          bun scripts/release/build-public-release.ts
          --version "${{ needs.identity.outputs.version }}"
          --source-commit "${{ needs.identity.outputs.commit }}"
          --target "${{ matrix.target }}"
          --outdir "dist/${{ matrix.target }}"
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/${{ matrix.target }}/*"
      - uses: actions/upload-artifact@v4
        with:
          name: "tasq-${{ matrix.target }}"
          path: "dist/${{ matrix.target }}/*"
          if-no-files-found: error

  npm:
    needs: [identity, cli]
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Pin the npm trusted-publishing client
        run: |
          npm install --global npm@11.18.0
          test "$(npm --version)" = "11.18.0"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: pnpm install --frozen-lockfile
      - name: Build package candidates
        run: >-
          bun scripts/release/build-public-packages.ts
          --version "${{ needs.identity.outputs.version }}"
          --source-commit "${{ needs.identity.outputs.commit }}"
          --outdir dist/packages
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/packages/*"
      - name: Publish through npm trusted publishing
        shell: bash
        run: |
          set -euo pipefail
          packages=(tasq-run-schema tasq-run-extension-sdk tasq-run-core tasq-run-protocol-adapters tasq-run-mcp tasq-run-console tasq-run-cli)
          for name in "${packages[@]}"; do
            tarball="dist/packages/${name}-${{ needs.identity.outputs.version }}.tgz"
            package_name="$(tar -xOf "$tarball" package/package.json | jq -r .name)"
            if npm view "${package_name}@${{ needs.identity.outputs.version }}" version >/dev/null 2>&1; then
              bun scripts/release/verify-npm-publication.ts \
                --package "$package_name" \
                --version "${{ needs.identity.outputs.version }}" \
                --source-commit "${{ needs.identity.outputs.commit }}" \
                --tarball "$tarball"
            else
              npm publish "$tarball" --access public --provenance
            fi
          done

  github-release:
    needs: [identity, cli, npm]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create or repair the immutable GitHub release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            mkdir -p existing-release
            gh release download "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --dir existing-release
            for asset in dist/*; do
              cmp "$asset" "existing-release/$(basename "$asset")"
            done
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --target "${{ needs.identity.outputs.commit }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
