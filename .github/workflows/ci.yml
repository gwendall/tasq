name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: pnpm install --frozen-lockfile
      - name: Verify install is source-tree neutral
        run: git diff --exit-code
      - run: pnpm typecheck
      - run: pnpm test

  console-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tasq-run/console exec playwright install --with-deps chromium
      - run: pnpm --filter @tasq-run/console test:browser

  console-browser-macos:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tasq-run/console exec playwright install chromium
      - run: pnpm --filter @tasq-run/console test:browser

  public-site-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tasq-internal/site exec playwright install --with-deps chromium
      - run: pnpm --filter @tasq-internal/site test:browser
